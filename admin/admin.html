<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Valor Wave CMS Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/admin.css"/>
</head>
<body>
  <div id="admin-shell">
    <aside class="sidebar">
      <div class="brand">Valor Wave Admin</div>
      <nav id="section-nav"></nav>
      <div class="sidebar-footer">
        <button id="btn-load" class="btn">Reload Draft</button>
        <button id="btn-save" class="btn primary">Save Draft</button>
        <button id="btn-publish" class="btn danger">Publish</button>
        <div id="dirty-indicator" class="dirty-indicator">Clean</div>
      </div>
    </aside>
    <main class="main">
      <header class="main-header">
        <h1 id="section-title">Select a section</h1>
        <span id="status-text"></span>
      </header>
      <section id="section-root"></section>
    </main>
  </div>

  <script type="module" src="/admin.js"></script>
</body>
</html>
