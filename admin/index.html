<!DOCTYPE html>
<html lang="en" data-theme="original">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valor Wave CMS</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <header class="cms-header">
    <div class="left">
      <h1>Valor Wave CMS</h1>
    </div>

    <div class="right">
      <select id="themeSelect">
        <option value="original">Original</option>
        <option value="multicam">Multicam</option>
        <option value="patriotic">Patriotic</option>
      </select>

      <button id="saveDraft">Save Draft</button>
      <button id="publish">Publish</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <div class="cms-body">
    <aside id="fieldList"></aside>

    <main id="editorPanel">
      <h2>Select a group</h2>
    </main>

    <section id="previewSection">
      <iframe id="previewFrame" src="https://valorwaveentertainment.com/"></iframe>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
