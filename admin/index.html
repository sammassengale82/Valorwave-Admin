if (localStorage.getItem("cms-auth") !== "true") {
  window.location.href = "/admin/login.html";
}

<!DOCTYPE html>
<html lang="en" data-theme="original">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valor Wave CMS</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <header class="cms-header">
    <div class="left">
      <h1>Valor Wave CMS</h1>
    </div>

    <div class="right">
      <select id="themeSelect">
        <option value="original">Original</option>
        <option value="multicam">Multicam</option>
        <option value="patriotic">Patriotic</option>
      </select>

      <button id="saveDraft">Save Draft</button>
      <button id="publish">Publish</button>
    </div>
  </header>

  <div class="cms-body">
    <!-- FIELD LIST -->
    <aside id="fieldList"></aside>

    <!-- EDITOR PANEL -->
    <main id="editorPanel">
      <h2 id="fieldTitle">Select a field</h2>

      <textarea id="editor" placeholder="Edit content here..."></textarea>

      <input id="linkEditor" placeholder="Link (optional)" />

      <div class="media-manager">
        <h3>Upload Image</h3>
        <input type="file" id="imageUpload" accept="image/*">
        <button id="uploadBtn">Upload</button>
        <div id="uploadStatus"></div>
      </div>
    </main>

    <!-- LIVE PREVIEW -->
    <section id="previewSection">
      <iframe id="previewFrame" src="https://valorwaveentertainment.com/"></iframe>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
