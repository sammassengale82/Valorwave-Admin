<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Valor Wave Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="vw-admin theme-original">
  <header class="vw-header">
    <div class="vw-header-left">
      <h1 class="vw-title">Valor Wave Admin</h1>
      <span class="vw-status">CMS Console</span>
    </div>
    <div class="vw-header-right">
      <button id="loginBtn" class="vw-btn vw-btn-primary">Login with GitHub</button>
      <button id="logoutBtn" class="vw-btn vw-btn-ghost" style="display:none;">Logout</button>
    </div>
  </header>

  <main class="vw-main">
    <section class="vw-toolbar">
      <div class="vw-toolbar-group">
        <label for="pageSelect" class="vw-label">Page</label>
        <select id="pageSelect" class="vw-select">
          <option value="home">Home</option>
          <!-- add more slugs as needed -->
        </select>
      </div>
      <div class="vw-toolbar-group vw-toolbar-actions">
        <button id="saveDraftBtn" class="vw-btn vw-btn-secondary">Save Draft</button>
        <button id="previewBtn" class="vw-btn vw-btn-ghost">Preview</button>
        <button id="publishBtn" class="vw-btn vw-btn-primary">Publish</button>
      </div>
      <div class="vw-toolbar-group">
        <span id="publishMsg" class="vw-status-msg"></span>
      </div>
    </section>

    <section class="vw-tabs">
      <button class="vw-tab vw-tab-active" data-tab="editor">Editor</button>
      <button class="vw-tab" data-tab="media">Media</button>
      <button class="vw-tab" data-tab="themes">Themes</button>
    </section>

    <section class="vw-tab-panels">
      <!-- Editor Panel -->
      <div id="tab-editor" class="vw-tab-panel vw-tab-panel-active">
        <div class="vw-editor-layout">
          <div class="vw-editor-left">
            <label class="vw-label">Page JSON</label>
            <textarea id="jsonEditor" class="vw-textarea" spellcheck="false"></textarea>
          </div>
          <div class="vw-editor-right">
            <label class="vw-label">Preview</label>
            <iframe id="previewFrame" class="vw-preview-frame"></iframe>
            <label class="vw-label">Sections</label>
            <ul id="sectionList" class="vw-section-list"></ul>
          </div>
        </div>
      </div>

      <!-- Media Panel -->
      <div id="tab-media" class="vw-tab-panel">
        <div class="vw-media-layout">
          <div id="mediaDropZone" class="vw-media-dropzone">
            <p>Drop files here or click to upload</p>
            <input id="mediaFileInput" type="file" multiple style="display:none;" />
          </div>
          <div id="mediaGrid" class="vw-media-grid"></div>
        </div>
      </div>

      <!-- Themes Panel -->
      <div id="tab-themes" class="vw-tab-panel">
        <div class="vw-theme-panel">
          <h2 class="vw-subtitle">Theme Mode</h2>
          <div class="vw-theme-options">
            <label class="vw-radio">
              <input type="radio" name="themeMode" value="original" checked />
              <span>Original</span>
            </label>
            <label class="vw-radio">
              <input type="radio" name="themeMode" value="patriotic" />
              <span>Patriotic</span>
            </label>
            <label class="vw-radio">
              <input type="radio" name="themeMode" value="multicam" />
              <span>Multicam</span>
            </label>
          </div>
          <button id="saveThemeBtn" class="vw-btn vw-btn-secondary">Save Theme</button>
          <div id="themeMsg" class="vw-status-msg"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
