<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valor Wave CMS Admin</title>

  <!-- Admin Styles -->
  <link rel="stylesheet" href="admin.css" />
</head>

<body>

  <!-- Header Bar -->
  <header id="admin-header">
    <div class="admin-title">Valor Wave CMS</div>
    <div id="admin-status">Loading…</div>
    <div class="admin-actions">
      <button id="btn-save" class="btn primary">Save Draft</button>
      <button id="btn-publish" class="btn secondary">Publish</button>
      <button id="btn-history" class="btn secondary">History</button>
      <button id="btn-logout" class="btn danger">Logout</button>
    </div>
  </header>

  <!-- Login Panel -->
  <div id="login-panel" class="login-hidden">
    <div class="login-card">
      <h2>Admin Login</h2>
      <p>You must sign in with GitHub to continue.</p>
      <button id="btn-login" class="btn primary">Sign in with GitHub</button>
    </div>
  </div>

  <!-- Main Admin UI -->
  <main id="admin-root"></main>

  <!-- Admin Logic -->
  <script src="admin.js" defer></script>
</body>
</html>
